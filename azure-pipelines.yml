trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageRepository: 'myapp'
  containerRegistry: 'stamanos'  # Το Docker Hub username σου
  imageTag: '$(Build.BuildId)'

stages:

# ─────────────────────────────────────────
# Stage 1: Build & Test
# ─────────────────────────────────────────
- stage: Build
  displayName: 'Build & Test'
  jobs:
  - job: BuildJob
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: 'Use .NET 8'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - script: dotnet restore src/MyApp/MyApp.csproj
      displayName: 'Restore NuGet packages'

    - script: dotnet build src/MyApp/MyApp.csproj --configuration Release --no-restore
      displayName: 'Build'

    - script: dotnet publish src/MyApp/MyApp.csproj -c Release -o $(Build.ArtifactStagingDirectory)/publish --no-restore
      displayName: 'Publish'

    - publish: $(Build.ArtifactStagingDirectory)/publish
      artifact: drop
      displayName: 'Upload artifact'

# ─────────────────────────────────────────
# Stage 2: Podman Build & Push
# ─────────────────────────────────────────
- stage: Docker
  displayName: 'Podman Build & Push'
  dependsOn: Build
  jobs:
  - job: PodmanJob
    steps:
    - checkout: self

    - script: |
        sudo apt-get update -qq
        sudo apt-get install -y podman
        podman --version
      displayName: 'Install Podman'

    - script: |
        podman build -t $(containerRegistry)/$(imageRepository):$(imageTag) .
        podman tag $(containerRegistry)/$(imageRepository):$(imageTag) $(containerRegistry)/$(imageRepository):latest
      displayName: 'Podman Build Image'

    - script: |
        echo "$(DOCKER_PASSWORD)" | podman login docker.io -u $(DOCKER_USERNAME) --password-stdin
        podman push docker.io/$(containerRegistry)/$(imageRepository):$(imageTag)
        podman push docker.io/$(containerRegistry)/$(imageRepository):latest
      displayName: 'Podman Push to Docker Hub'
      env:
        DOCKER_USERNAME: $(DOCKER_USERNAME)
        DOCKER_PASSWORD: $(DOCKER_PASSWORD)

# ─────────────────────────────────────────
# Stage 3: Deploy to Kubernetes (Minikube)
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Kubernetes'
  dependsOn: Docker
  jobs:
  - job: DeployJob
    steps:
    - checkout: self

    - task: KubernetesManifest@1
      displayName: 'Deploy to K8s'
      inputs:
        action: 'deploy'
        kubernetesServiceConnection: 'MinikubeConnection'  # Service connection στο Azure DevOps
        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml
          k8s/hpa.yaml
        containers: '$(containerRegistry)/$(imageRepository):$(imageTag)'