trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageRepository: 'myapp'
  containerRegistry: 'ghcr.io/stamanos'  # GitHub Container Registry
  imageTag: '$(Build.BuildId)'

stages:

# ─────────────────────────────────────────
# Stage 1: Build & Test
# ─────────────────────────────────────────
- stage: Build
  displayName: 'Build & Test'
  jobs:
  - job: BuildJob
    steps:
    - checkout: self

    - task: UseDotNet@2
      displayName: 'Use .NET 8'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - script: dotnet restore src/MyApp/MyApp.csproj
      displayName: 'Restore NuGet packages'

    - script: dotnet build src/MyApp/MyApp.csproj --configuration Release --no-restore
      displayName: 'Build'

    - script: dotnet publish src/MyApp/MyApp.csproj -c Release -o $(Build.ArtifactStagingDirectory)/publish --no-restore
      displayName: 'Publish'

    - publish: $(Build.ArtifactStagingDirectory)/publish
      artifact: drop
      displayName: 'Upload artifact'

# ─────────────────────────────────────────
# Stage 2: Podman Build & Push
# ─────────────────────────────────────────
- stage: Docker
  displayName: 'Podman Build & Push'
  dependsOn: Build
  jobs:
  - job: PodmanJob
    steps:
    - checkout: self

    - script: |
        sudo apt-get update -qq
        sudo apt-get install -y podman
        podman --version
      displayName: 'Install Podman'

    - script: |
        podman build -t $(containerRegistry)/$(imageRepository):$(imageTag) .
        podman tag $(containerRegistry)/$(imageRepository):$(imageTag) $(containerRegistry)/$(imageRepository):latest
      displayName: 'Podman Build Image'

    - script: |
        echo "$(GITHUB_TOKEN)" | podman login ghcr.io -u stamanos --password-stdin
        podman push $(containerRegistry)/$(imageRepository):$(imageTag)
        podman push $(containerRegistry)/$(imageRepository):latest
      displayName: 'Podman Push to GitHub Container Registry'
      env:
        GITHUB_TOKEN: $(GITHUB_TOKEN)

# ─────────────────────────────────────────
# Stage 3: Deploy to Kubernetes (Minikube)
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Kubernetes'
  dependsOn: Docker
  jobs:
  - job: DeployJob
    pool:
      name: 'LocalPool'  # Self-hosted agent με πρόσβαση στο Minikube
    steps:
    - checkout: self

    - script: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/hpa.yaml
        kubectl set image deployment/myapp myapp=ghcr.io/stamanos/myapp:$(Build.BuildId)
        kubectl rollout status deployment/myapp
      displayName: 'Deploy to Minikube'