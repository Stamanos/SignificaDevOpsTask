apiVersion: v1
kind: Service
metadata:
  name: myapp-service
spec:
  selector:
    app: myapp
  type: NodePort      # NodePort για Minikube (σε cloud θα χρησιμοποιούσαμε LoadBalancer)
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30080   # Accessible στο http://<minikube-ip>:30080
