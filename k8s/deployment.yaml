apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  labels:
    app: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: ghcr.io/stamanos/myapp:latest  #ToDo: replace with actual image tag in pipeline

         # ─────────────────────────────
         # Container Port
         # ─────────────────────────────
        ports:
        - containerPort: 8080

        # ─────────────────────────────
        # Resource limits
        # ─────────────────────────────
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        # ─────────────────────────────
        # Startup Probe
        # ─────────────────────────────
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 10
          periodSeconds: 5

        # ─────────────────────────────
        # Readiness Probe
        # ─────────────────────────────
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        # ─────────────────────────────
        # Liveness Probe
        # ─────────────────────────────
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
